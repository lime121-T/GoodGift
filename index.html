        border: 1px solid rgba(229, 224, 216, 0.6);
    }
    .btn-soft {
        background-color: #EDEBE6;
        border-radius: 60px;
        padding: 10px 20px;
        font-weight: 500;
        color: #5A4F45;
        transition: all 0.2s;
    }
    .btn-soft:active { transform: scale(0.97); background-color: #E3DFD8; }
    .btn-primary-soft {
        background-color: #E7F1E9;
        color: #4A5B4A;
        font-weight: 600;
        border-radius: 60px;
        padding: 12px 20px;
        transition: all 0.2s;
    }
    .btn-primary-soft:active { transform: scale(0.98); background-color: #D9E3DA; }
    /* 保留原有 .btn-gradient 用于兼容，但改用新颜色 */
    .btn-gradient {
        background: linear-gradient(135deg, #E7F1E9 0%, #D9E3DA 100%);

        padding: 12px 20px;
        font-weight: 600;
        color: #4A5B4A;
        transition: all 0.2s;
    }
    .btn-gradient:active { transform: scale(0.98); background-color: #D9E3DA; }
    .skeleton {
        background: linear-gradient(90deg, #EDEBE6 25%, #F4F1EC 50%, #EDEBE6 75%);
        background-size: 200% 100%;
        animation: skeleton-loading 1.5s infinite;
    }
    @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .bottom-nav {
        position: fixed; bottom: 0; left: 0; right: 0;

    }
    .toast {

        background: rgba(90, 79, 69, 0.9); backdrop-filter: blur(8px);
        color: #FEFAF5; padding: 12px 24px; border-radius: 60px;
        z-index: 100; font-weight: 500; font-size: 0.9rem;
    }
    .modal-overlay {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(90, 79, 69, 0.2); backdrop-filter: blur(4px);
        z-index: 60; display: flex; align-items: center; justify-content: center;

    .modal-content {

        max-width: 90%; max-height: 80vh; overflow-y: auto;

            // 工具函数

                // 生成唯一ID
                generateId: () => {
                    return Date.now().toString(36) + Math.random().toString(36).substr(2);
                },

                // 计算距离某天的天数
                calculateDaysUntil: (dateString) => {
                    if (!dateString) return null;
                    const targetDate = new Date(dateString);
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    targetDate.setHours(0, 0, 0, 0);

                    // 如果今年已过，计算明年的
                    let thisYear = new Date(targetDate);
                    thisYear.setFullYear(today.getFullYear());
                    if (thisYear < today) {
                        thisYear.setFullYear(today.getFullYear() + 1);
                    }

                    const diffTime = thisYear - today;
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    return diffDays;
                },

                // 格式化日期
                formatDate: (dateString) => {
                    if (!dateString) return '';
                    const date = new Date(dateString);
                    return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
                },

                // 提取生日月份和日期
                extractMonthDay: (dateString) => {
                    if (!dateString) return null;
                    const date = new Date(dateString);
                    return {
                        month: date.getMonth() + 1,
                        day: date.getDate()
                    };
                },

                // 显示 toast
                showToast: (message, duration = 2000) => {
                    const container = document.getElementById('toast-container');
                    const toast = document.createElement('div');
                    toast.className = 'toast';
                    toast.textContent = message;
                    container.appendChild(toast);
                    setTimeout(() => toast.remove(), duration);
                },

                // 显示 modal
                showModal: (content) => {
                    const container = document.getElementById('modal-container');
                    const overlay = document.createElement('div');
                    overlay.className = 'modal-overlay';
                    overlay.innerHTML = `<div class="modal-content">${content}</div>`;
                    overlay.onclick = (e) => {
                        if (e.target === overlay) {
                            overlay.remove();
                        }
                    };
                    container.appendChild(overlay);
                },

                // 隐藏 modal
                hideModal: () => {
                    const container = document.getElementById('modal-container');
                    container.innerHTML = '';
                }
            },

            // localStorage 操作函数
            storage: {
                // 获取所有收礼人
                getRecipients: () => {
                    const data = localStorage.getItem('recipients');
                    return data ? JSON.parse(data) : [];
                },

                // 保存收礼人
                saveRecipient: (recipient) => {
                    const recipients = GiftApp.storage.getRecipients();
                    const existingIndex = recipients.findIndex(r => r.id === recipient.id);
                    if (existingIndex >= 0) {
                        recipients[existingIndex] = recipient;
                    } else {
                        recipient.createdAt = recipient.createdAt || Date.now();
                        recipients.push(recipient);
                    }
                    localStorage.setItem('recipients', JSON.stringify(recipients));
                },

                // 删除收礼人
                deleteRecipient: (id) => {
                    const recipients = GiftApp.storage.getRecipients();
                    const filtered = recipients.filter(r => r.id !== id);
                    localStorage.setItem('recipients', JSON.stringify(filtered));
                },

                // 获取所有礼物记录

                    const data = localStorage.getItem('giftRecords');
                    let records = data ? JSON.parse(data) : [];
                    if (recipientId) {
                        records = records.filter(r => r.recipientId === recipientId);
                    }
                    // 按创建时间倒序排列
                    return records.sort((a, b) => b.createdAt - a.createdAt);
                },

                // 保存礼物记录

                    const records = GiftApp.storage.getGiftRecords();

                    } else {
                        record.createdAt = record.createdAt || Date.now();

                    }

                    const index = records.findIndex(r => r.id === recordId);

                        records[index].comment = comment;
                        localStorage.setItem('giftRecords', JSON.stringify(records));

            ],
            // 判断礼物是否适合该收礼人（根据关系过滤）
            isGiftSuitable: (gift, relationship) => {
                const female = ['妈妈', '女友', '闺蜜', '女儿', '奶奶', '外婆', '姐姐', '妹妹', '爱人'];
                const male = ['爸爸', '男友', '兄弟', '爷爷', '外公', '哥哥', '弟弟'];
                const child = ['小朋友', '孩子'];
                // 长辈类（领导、前辈、老师等）
                const elder = ['领导', '前辈', '老师', '长辈'];
                const tags = gift.tags;
                const giftName = gift.name;
                
                // 1. 女性收礼人：不能出现男性专属礼物
                if (female.includes(relationship)) {
                    if (tags.includes('男友') || tags.includes('爸爸') || tags.includes('兄弟')) {
                        return false;
                    }
                    // 额外过滤：剃须刀、游戏机等明显男性向礼物
                    if (giftName.includes('剃须刀') || giftName.includes('游戏机') || 
                        giftName.includes('电竞') || giftName.includes('机械键盘')) {
                        return false;
                    }
                }
                
                // 2. 男性收礼人：不能出现女性专属礼物
                if (male.includes(relationship)) {
                    if (tags.includes('女友') || tags.includes('妈妈') || tags.includes('闺蜜')) {
                        return false;
                    }
                    // 额外过滤：明显女性向礼物
                    if (giftName.includes('口红') || giftName.includes('丝巾') || 
                        giftName.includes('护手霜') || giftName.includes('香薰')) {
                        return false;
                    }
                }
                
                // 3. 小朋友收礼人：只能出现含「小朋友」标签的礼物
                if (child.includes(relationship)) {
                    return tags.includes('小朋友');
                }
                
                // 4. 成人收礼人：不能出现小朋友专属礼物
                if (!child.includes(relationship) && tags.includes('小朋友')) {
                    return false;
                }
                
                // 5. 长辈/领导类：过滤掉过于年轻化或娱乐化的礼物
                if (elder.includes(relationship)) {
                    if (tags.includes('游戏') || tags.includes('电竞') || 
                        giftName.includes('游戏机') || giftName.includes('玩偶')) {
                        return false;
                    }
                }
                
                return true;
            },

            // Mock 推荐函数
           searchGifts: (queryText, recipientId, excludeGiftNames = []) => {
                const giftDatabase = GiftApp.giftDatabase;
                const allRecords = GiftApp.storage.getGiftRecords();
                const recipient = recipientId ? GiftApp.storage.getRecipients().find(r => r.id === recipientId) : null;
                const relationship = recipient ? recipient.relationship : '';

                // 根据关系过滤礼物（核心改进）
                let suitableGifts = [...giftDatabase];
                if (relationship) {
                    suitableGifts = giftDatabase.filter(gift => GiftApp.isGiftSuitable(gift, relationship));
                    if (suitableGifts.length === 0) suitableGifts = [...giftDatabase];
                }

                // 提取用户输入的关键词
                const keywords = { relationship: [], budget: null, style: [], occasion: [] };
                const budgetMatch = queryText.match(/预算(\d+)-(\d+)/);
                if (budgetMatch) keywords.budget = [parseInt(budgetMatch[1]), parseInt(budgetMatch[2])];

                const relationshipKeywords = ['男友', '女友', '爸爸', '妈妈', '领导', '闺蜜', '兄弟', '小朋友', '爱人', '亲人', '朋友', '前辈', '同事'];
                relationshipKeywords.forEach(rel => {
                    if (queryText.includes(rel) || (recipient && recipient.relationship === rel)) {
                        keywords.relationship.push(rel);
                    }
                });

                const styleMatch = queryText.match(/风格[:：]\s*([\u4e00-\u9fa5]+)/);
                if (styleMatch) keywords.style.push(styleMatch[1]);

                const occasionMatch = queryText.match(/场合[:：]\s*([\u4e00-\u9fa5]+)/);
                if (occasionMatch) keywords.occasion.push(occasionMatch[1]);

                const recipientRecords = allRecords.filter(r => r.recipientId === recipientId);
                const likedGifts = recipientRecords.filter(r => r.feedback === 'good').map(r => r.giftName);
                const dislikedGifts = recipientRecords.filter(r => r.feedback === 'bad').map(r => r.giftName);
                const sentGifts = recipientRecords.map(r => r.giftName);

                // 计算匹配分数（只在 suitableGifts 中计算）
                const scoredGifts = suitableGifts.map(gift => {
                    let score = 0;
                    if (keywords.relationship.length > 0) {
                        keywords.relationship.forEach(rel => {
                            if (gift.tags.includes(rel)) score += 30;
                        });
                    }
                    if (keywords.budget) {
                        const [giftMin, giftMax] = gift.price_range.split('-').map(Number);
                        if (keywords.budget[0] <= giftMax && keywords.budget[1] >= giftMin) score += 20;
                    }
                    if (keywords.style.length > 0) {
                        keywords.style.forEach(style => {
                            if (gift.style_tag === style || gift.tags.some(t => t === style)) score += 15;
                        });
                    }
                    likedGifts.forEach(likedGift => {
                        const likedGiftObj = giftDatabase.find(g => g.name === likedGift);
                        if (likedGiftObj && gift.style_tag === likedGiftObj.style_tag) score += 10;
                    });
                    dislikedGifts.forEach(dislikedGift => {
                        const dislikedGiftObj = giftDatabase.find(g => g.name === dislikedGift);
                        if (dislikedGiftObj && gift.style_tag === dislikedGiftObj.style_tag) score -= 20;
                    });
                    if (sentGifts.includes(gift.name)) score -= 50;
                    if (excludeGiftNames.includes(gift.name)) score -= 999;
                    return { gift, score };
                });

                // 随机排序（保证换一批多样性）
                let candidates = scoredGifts.filter(item => item.score > -30).map(item => item.gift);
                for (let i = candidates.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
                }
                let recommendations = candidates.slice(0, 5);

                // 不足5个时从 suitableGifts 中补充
                if (recommendations.length < 5) {
                    const remaining = suitableGifts.filter(gift =>
                        !recommendations.includes(gift) &&
                        !excludeGiftNames.includes(gift.name) &&
                        !sentGifts.includes(gift.name)
                    );
                    const shuffled = remaining.sort(() => Math.random() - 0.5);
                    recommendations = [...recommendations, ...shuffled.slice(0, 5 - recommendations.length)];
                }

                // 生成推荐理由
                return recommendations.map(gift => {
                    let reason = '';
                    if (keywords.relationship.length > 0 && gift.tags.some(t => keywords.relationship.includes(t))) {
                        reason += `适合${keywords.relationship[0]}，`;
                    }
                    if (keywords.budget) reason += `价格在预算范围内，`;
                    if (keywords.style.length > 0) reason += `${keywords.style[0]}风格，`;
                    reason += gift.style_tag === '科技' ? '实用又时尚' :
                              gift.style_tag === '生活' ? '贴心又实用' :
                              gift.style_tag === '创意' ? '独特又有心意' :
                              gift.style_tag === '文艺' ? '有品味又有格调' :
                              gift.style_tag === '养生' ? '关心TA的健康' : '实用又贴心';
                    return {
                        name: gift.name,
                        price_range: gift.price_range,
                        reason: reason,
                        image_emoji: gift.image_emoji,
                        style_tag: gift.style_tag
                    };
                });
            },
            // 真实 AI 推荐函数（预留）
            aiRecommend: async (queryText, recipientId) => {
                // 预留接口，可以接入真实的AI API
                // 当前返回 Mock 数据
                return GiftApp.searchGifts(queryText, recipientId);
            },

            // 全局状态
            state: {
                currentPage: 'home',
                selectedRecipientId: null,
                currentRecommendations: [],
                currentInputText: '',
                excludeGiftNames: [],
                isRecording: false,
                selectedGift: null
            }

        // 获取最近送礼的收礼人
        function getRecentRecipients(recipients, giftRecords) {
            if (giftRecords.length === 0) return [];

            // 按时间排序获取最近的记录
            const recentRecords = giftRecords
                .sort((a, b) => b.createdAt - a.createdAt)
                .slice(0, 10);

            // 获取这些记录对应的收礼人
            const recentRecipientIds = [...new Set(recentRecords.map(r => r.recipientId))];
            const recentRecipients = recentRecipientIds
                .map(id => recipients.find(r => r.id === id))
                .filter(r => r)
                .slice(0, 3);

            return recentRecipients;
        }

        // ========================================

        function toggleVoiceInput() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {

        function startRecording() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                GiftApp.state.isRecording = true;
                renderPage('home');
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                const input = document.getElementById('gift-input');
                input.value += transcript;
                GiftApp.state.currentInputText = input.value;
            };

            recognition.onerror = (event) => {
                console.error('语音识别错误:', event.error);
                GiftApp.utils.showToast('语音识别失败，请重试');
                stopRecording();
            };

            recognition.onend = () => {
                stopRecording();
            };

            recognition.start();
        }

        function stopRecording() {
            if (recognition) {
                recognition.stop();
                recognition = null;
            }
            GiftApp.state.isRecording = false;
            renderPage('home');
        }

        // 打开日历 Modal
        function openCalendarModal() {
            const recipients = GiftApp.storage.getRecipients();
            const today = new Date();
            const currentMonth = today.getMonth();
            const currentYear = today.getFullYear();

            // 获取当前月份所有有生日或纪念日的日期
            const eventDates = {};
            recipients.forEach(r => {
                if (r.birthday) {
                    const date = GiftApp.utils.extractMonthDay(r.birthday);
                    if (date.month === currentMonth + 1) {
                        const key = date.day;
                        if (!eventDates[key]) eventDates[key] = [];
                        eventDates[key].push({ name: r.name, type: '生日' });
                    }
                }
                if (r.anniversary) {
                    const date = GiftApp.utils.extractMonthDay(r.anniversary);
                    if (date.month === currentMonth + 1) {
                        const key = date.day;
                        if (!eventDates[key]) eventDates[key] = [];
                        eventDates[key].push({ name: r.name, type: '纪念日' });
                    }
                }
            });

            // 生成日历
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();

            const calendarDays = [];
            for (let i = 0; i < firstDay; i++) {
                calendarDays.push('<div class="h-10"></div>');
            }
            for (let day = 1; day <= daysInMonth; day++) {
                const hasEvent = eventDates[day];
                const isToday = day === today.getDate();
                calendarDays.push(`
                    <div
                        class="h-10 flex flex-col items-center justify-center rounded-lg cursor-pointer ${isToday ? 'bg-primary text-white' : hasEvent ? 'bg-orange-100 text-orange-600' : 'hover:bg-gray-100'}"
                        onclick="showDayEvents(${day})"
                    >
                        <span class="text-sm">${day}</span>
                        ${hasEvent ? '<span class="w-1.5 h-1.5 rounded-full bg-orange-500 mt-0.5"></span>' : ''}
                    </div>
                `);
            }

            const modalContent = `
                <div>
                    <h2 class="text-xl font-bold text-gray-900 mb-4 text-center">${currentYear}年${currentMonth + 1}月</h2>
                    <div class="grid grid-cols-7 gap-1 mb-2">
                        ${['日', '一', '二', '三', '四', '五', '六'].map(d => `<div class="text-center text-xs text-gray-500 py-2">${d}</div>`).join('')}
                    </div>
                    <div class="grid grid-cols-7 gap-1">
                        ${calendarDays.join('')}
                    </div>
                </div>
            `;
            GiftApp.utils.showModal(modalContent);
        }

        // 更新收礼人
        function updateRecipient() {
            const recipient = GiftApp.storage.getRecipients().find(r => r.id === GiftApp.state.selectedRecipientId);
            if (!recipient) return;

            recipient.name = document.getElementById('edit-recipient-name').value.trim();
            recipient.relationship = document.getElementById('edit-recipient-relationship').value;
            recipient.birthday = document.getElementById('edit-recipient-birthday').value || undefined;
            recipient.anniversary = document.getElementById('edit-recipient-anniversary').value || undefined;
            recipient.memo = document.getElementById('edit-recipient-memo').value.trim() || undefined;

            GiftApp.storage.saveRecipient(recipient);
            GiftApp.utils.hideModal();
            GiftApp.utils.showToast('保存成功');
            renderPage('recipient-detail');
        }

        // 删除收礼人
        function deleteRecipient() {
            if (!confirm('确定要删除这个收礼人吗？此操作不可恢复。')) return;

            GiftApp.storage.deleteRecipient(GiftApp.state.selectedRecipientId);
            GiftApp.utils.hideModal();
            GiftApp.utils.showToast('已删除');
            navigateTo('archive');
        }

        // 编辑反馈
        function editFeedback(recordId) {
            const record = GiftApp.storage.getGiftRecords().find(r => r.id === recordId);
            if (!record) return;

            const modalContent = `
                <div>
                    <h2 class="text-xl font-bold text-gray-900 mb-4">${record.giftName}</h2>
                    <div class="text-center mb-4">
                        <p class="text-gray-600 text-sm mb-3">TA收到礼物后的反应如何？</p>
                        <div class="flex gap-3 justify-center">
                            <button onclick="selectFeedbackForEdit('good')" class="feedback-edit-btn w-14 h-14 rounded-full ${record.feedback === 'good' ? 'bg-green-100 ring-2 ring-green-500' : 'bg-gray-100'} hover:bg-green-100 flex items-center justify-center text-2xl transition-all" data-feedback="good">😊</button>
                            <button onclick="selectFeedbackForEdit('neutral')" class="feedback-edit-btn w-14 h-14 rounded-full ${record.feedback === 'neutral' ? 'bg-gray-200 ring-2 ring-gray-500' : 'bg-gray-100'} hover:bg-gray-200 flex items-center justify-center text-2xl transition-all" data-feedback="neutral">😐</button>
                            <button onclick="selectFeedbackForEdit('bad')" class="feedback-edit-btn w-14 h-14 rounded-full ${record.feedback === 'bad' ? 'bg-red-100 ring-2 ring-red-500' : 'bg-gray-100'} hover:bg-red-100 flex items-center justify-center text-2xl transition-all" data-feedback="bad">😞</button>
                        </div>
                        <input type="hidden" id="edit-feedback-value" value="${record.feedback || ''}">
                    </div>
                    <div class="mb-6">
                        <label class="block text-sm text-gray-600 mb-2">备注（可选）</label>
                        <textarea id="edit-feedback-comment" class="w-full px-4 py-3 bg-gray-100 rounded-xl text-gray-900 focus:outline-none focus:ring-2 focus:ring-primary-light resize-none" rows="2" placeholder="记录一下反馈...">${record.comment || ''}</textarea>
                    </div>
                    <button onclick="saveFeedback('${recordId}')" class="w-full btn-gradient text-white font-bold py-4 rounded-xl">
                        保存
                    </button>
                </div>
            `;
            GiftApp.utils.showModal(modalContent);
        }

        function selectFeedbackForEdit(feedback) {
            document.querySelectorAll('.feedback-edit-btn').forEach(btn => {
                btn.classList.remove('ring-2', 'ring-green-500', 'ring-gray-500', 'ring-red-500');
                if (feedback === 'good') btn.classList.remove('bg-green-100');
                if (feedback === 'neutral') btn.classList.remove('bg-gray-200');
                if (feedback === 'bad') btn.classList.remove('bg-red-100');
            });

            const selectedBtn = document.querySelector(`[data-feedback="${feedback}"]`);
            if (feedback === 'good') selectedBtn.classList.add('bg-green-100', 'ring-2', 'ring-green-500');
            if (feedback === 'neutral') selectedBtn.classList.add('bg-gray-200', 'ring-2', 'ring-gray-500');
            if (feedback === 'bad') selectedBtn.classList.add('bg-red-100', 'ring-2', 'ring-red-500');

            document.getElementById('edit-feedback-value').value = feedback;
        }

        function saveFeedback(recordId) {
            const feedback = document.getElementById('edit-feedback-value').value;
            const comment = document.getElementById('edit-feedback-comment').value.trim();

            GiftApp.storage.updateGiftFeedback(recordId, feedback || null, comment || undefined);
            GiftApp.utils.hideModal();
            GiftApp.utils.showToast('反馈已保存');
            renderPage('recipient-detail');
        }

        // 滚动到第一个未反馈的记录
        function scrollToFirstUnfeedbacked() {
            const allRecords = GiftApp.storage.getGiftRecords();
            const unfeedbackedRecord = allRecords.find(r => {
                const daysSinceCreation = (Date.now() - r.createdAt) / (1000 * 60 * 60 * 24);
                return daysSinceCreation > 7 && !r.feedback;
            });

            if (unfeedbackedRecord) {
                const recipient = GiftApp.storage.getRecipients().find(r => r.id === unfeedbackedRecord.recipientId);
                if (recipient) {
                    openRecipientDetail(recipient.id);

                    // 等待页面渲染后滚动到对应记录
                    setTimeout(() => {
                        const recordElement = document.getElementById(`record-${unfeedbackedRecord.id}`);
                        if (recordElement) {
                            recordElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            recordElement.classList.add('ring-2', 'ring-orange-500');
                            setTimeout(() => {
                                recordElement.classList.remove('ring-2', 'ring-orange-500');
                            }, 3000);
                        }
                    }, 100);
                }
            }
        }
